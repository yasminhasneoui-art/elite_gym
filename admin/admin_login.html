<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Élite Gym — Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--white:#fff;--cream:#faf8f4;--dark:#1c1712;--mid:#4a4035;--muted:#9a8a78;--gold:#c9a84c;--gold2:#e8c96a;--border:#e8e0d4;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{background:#242018;border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:56px 52px;width:100%;max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,.4);}
.logo{font-family:'Montserrat',sans-serif;font-weight:900;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:var(--white);text-decoration:none;display:block;margin-bottom:8px;}
.logo span{color:var(--gold);}
.tag{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:32px;display:block;}
.title{font-family:'Montserrat',sans-serif;font-weight:900;font-size:28px;margin-bottom:6px;}
.sub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:36px;}
label{display:block;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px;}
.field{margin-bottom:18px;}
input{width:100%;background:#1a1610;border:1px solid rgba(255,255,255,.1);border-bottom:2px solid rgba(255,255,255,.12);color:var(--white);padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .25s;border-radius:4px;}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.12);}
input::placeholder{color:rgba(255,255,255,.2);}
.btn{width:100%;background:var(--gold);color:var(--dark);border:none;padding:16px;font-size:14px;font-weight:700;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .25s;margin-top:8px;}
.btn:hover{background:var(--gold2);}
.error{background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);color:#fc6b77;padding:12px 16px;border-radius:4px;font-size:13px;font-weight:600;margin-bottom:16px;display:none;}
.error.visible{display:block;}
.back{display:block;text-align:center;margin-top:24px;color:rgba(255,255,255,.3);font-size:12px;text-decoration:none;transition:color .2s;}
.back:hover{color:var(--gold);}
.lock-icon{font-size:36px;margin-bottom:20px;display:block;}
</style>
</head>
<body>
<div class="login-box">
  <span class="lock-icon">🔐</span>
  <a href="../public/index.html" class="logo">ÉLITE<span>GYM</span></a>
  <span class="tag">Espace Administration</span>
  <h2 class="title">Connexion Admin</h2>
  <p class="sub">Accès réservé au personnel autorisé.</p>

  <div class="error" id="errMsg"></div>

  <form id="adminLoginForm" novalidate>
    <div class="field">
      <label for="username">Identifiant admin</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="mot_de_passe">Mot de passe</label>
      <input type="password" id="mot_de_passe" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Accéder au tableau de bord →</button>
  </form>

  <a href="../public/index.html" class="back">← Retour au site public</a>
</div>

<script>
document.getElementById('adminLoginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const err = document.getElementById('errMsg');
  err.classList.remove('visible');
  const btn = e.target.querySelector('button');
  btn.textContent = 'Connexion…'; btn.disabled = true;

  const fd = new FormData();
  fd.append('username', document.getElementById('username').value.trim());
  fd.append('mot_de_passe', document.getElementById('mot_de_passe').value);

  try {
    const res = await fetch('../api/admin_login.php', { method:'POST', body:fd });
    const data = await res.json();
    if (data.success) {
      window.location.href = 'admin.php';
    } else {
      err.textContent = '⚠ ' + data.message;
      err.classList.add('visible');
      btn.textContent = 'Accéder au tableau de bord →';
      btn.disabled = false;
    }
  } catch {
    err.textContent = '⚠ Impossible de contacter le serveur.';
    err.classList.add('visible');
    btn.textContent = 'Accéder au tableau de bord →';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
